<!DOCTYPE html>
<html lang="en">

  }

  /* Theme classes omitted for brevity, include previous styles here */

  /* Error message styling */
  #errorMessage {
    position: fixed;
    top: 20px;
    right: 20px;
    background: #ff4d4f;
    color: white;
    padding: 12px 20px;
    border-radius: 8px;
    box-shadow: 0 4px 8px rgba(0,0,0,0.2);
    font-weight: 600;

<body>

<!-- Error message container -->
<div id="errorMessage"></div>

<!-- Logo/Header -->
<div id="logo-container">
  <img id="logo" src="https://via.placeholder.com/60?text=🎵" alt="Logo" />
  <div id="logo-text">Audio Button Board</div>
</div>

<!-- Theme selector -->
<select id="themeSelect" title="Choose Theme">
  <option value="light">Light</option>
  <option value="dark">Dark</option>
  <option value="colorful">Colorful</option>
  <option value="vibrant">Vibrant</option>
  <option value="pastel">Pastel</option>
  <option value="metallic">Metallic</option>
</select>

<!-- Volume toggle button -->
<button id="volume-btn" title="Toggle Mute">🔊</button>

<h2>Recording</h2>
<div id="recording-controls" class="panel">
    <button id="startRecord">Start Recording</button>
    <button id="stopRecord" disabled>Stop Recording</button>
    <p id="recordStatus">Not recording.</p>

    <label>
        Program to button:
        <select id="assignSelect"></select>
    </label>
    <button id="assignBtn" disabled>Assign Recording</button>
</div>

<h2>Customize Buttons</h2>
<div id="customizer" class="panel">
    <label>
        Select Button:
        <select id="customSelect"></select>
    </label>
    <label>
        Name:
        <input type="text" id="customName" />
    </label>
    <label>
        Color:
        <input type="color" id="customColor" />
    </label>
    <button id="saveCustom">Save Changes</button>
</div>

<h2>Soundboard</h2>
<div id="buttons" class="panel"></div>

<script>
/* ------------------------- Theme management (include previous full themes setup and applyTheme function) -------------------------*/

// Initialize theme
const themeSelect = document.getElementById('themeSelect');
const themes = { /* ... themes object ... (use the previous themes object code) ... */ };
function applyTheme(themeName) { /* ... (use previous applyTheme code) ... */ }
const savedTheme = localStorage.getItem('theme') || 'light';
applyTheme(savedTheme);
document.getElementById('themeSelect').value = savedTheme;
for (const themeName in themes) {
  // populate options
}

/* ------------------------- Create 100 Buttons and setup variables -------------------------*/
const buttonContainer = document.getElementById("buttons");
const assignSelect = document.getElementById("assignSelect");
const customSelect = document.getElementById("customSelect");
const volumeBtn = document.getElementById("volume-btn");
const errorDiv = document.getElementById('errorMessage');

let audioClips = new Array(100).fill(null);
let buttons = [];
let buttonData = JSON.parse(localStorage.getItem("buttonData") || "{}");
let isMuted = false;

/* Show error message */
function showError(message) {
  errorDiv.textContent = message;
  errorDiv.style.display = 'block';
  setTimeout(() => { errorDiv.style.display = 'none'; }, 5000);
}

/* Generate buttons dynamically */
for (let i = 1; i <= 100; i++) {
  const index = i - 1;
  const btn = document.createElement("button");
  btn.textContent = buttonData[index]?.name || ("Button " + i);
  btn.style.backgroundColor = buttonData[index]?.color || "";
  btn.dataset.index = index;

  btn.addEventListener("click", () => {
    if (audioClips[index]) {
      if (!isMuted) {
        try {
          audioClips[index].play();
        } catch (err) {
          showError("Error playing audio for Button " + (index + 1));
          console.error(err);
        }
      }
    } else {
      showError("No audio saved for Button " + (index + 1));
    }
  });

  buttonContainer.appendChild(btn);
  buttons[index] = btn;

  // Populate dropdowns
  const opt = document.createElement("option");
  opt.value = index;
  opt.textContent = "Button " + i;
  assignSelect.appendChild(opt);

  const opt2 = document.createElement("option");
  opt2.value = index;
  opt2.textContent = "Button " + i;
  customSelect.appendChild(opt2);
}

/* Load saved audio from localStorage */
async function loadSavedAudio() {
  for (let i = 0; i < 100; i++) {
    const base64 = localStorage.getItem("audio_" + i);
    if (base64) {
      try {
        const blob = base64ToBlob(base64, "audio/webm");
        audioClips[i] = new Audio(URL.createObjectURL(blob));
        console.log("Loaded audio for button", i);
      } catch (err) {
        showError("Error loading audio for Button " + (i + 1));
        console.error("Loading error for button", i, err);
      }
    } else {
      audioClips[i] = null;
    }
  }
}
loadSavedAudio();

/* Recording with silence cropping */
let mediaRecorder;
let chunks = [];
let recordedAudioBlob = null;

const startBtn = document.getElementById("startRecord");
const stopBtn = document.getElementById("stopRecord");
const assignBtn = document.getElementById("assignBtn");
const statusText = document.getElementById("recordStatus");

startBtn.onclick = async () => {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    mediaRecorder = new MediaRecorder(stream);
    chunks = [];
    recordedAudioBlob = null;

    mediaRecorder.ondataavailable = (e) => chunks.push(e.data);
    mediaRecorder.onstop = async () => {
      const rawBlob = new Blob(chunks, { type: "audio/webm" });
      // Trim silence
      try {
        const trimmedBlob = await trimSilence(rawBlob);
        recordedAudioBlob = trimmedBlob;
        // Enable assign button
        assignBtn.disabled = false;
        document.getElementById("recordStatus").textContent = "Finished. Ready to assign.";
        console.log("Recording trimmed and ready");
      } catch (err) {
        showError("Error trimming silence");
        console.error(err);
      }
    };

    mediaRecorder.start();
    document.getElementById("startRecord").disabled = true;
    document.getElementById("stopRecord").disabled = false;
    statusText.textContent = "Recording...";
  } catch (err) {
    showError("Error accessing microphone");
    console.error(err);
  }
};

document.getElementById("stopRecord").onclick = () => {
  if (mediaRecorder && mediaRecorder.state !== "inactive") {
    try {
      mediaRecorder.stop();
      document.getElementById("startRecord").disabled = false;
      document.getElementById("stopRecord").disabled = true;
    } catch (err) {
      showError("Error stopping recording");
      console.error(err);
    }
  }
};

/* Save to storage after trimming silence */
const blobToBase64 = (blob) => {
  return new Promise((resolve) => {
    const reader = new FileReader();
    reader.onloadend = () => resolve(reader.result.split(",")[1]);
    reader.readAsDataURL(blob);
  });
};

async function trimSilence(blob, silenceThreshold = 0.02, minSilenceDuration = 0.2) {
  const arrayBuffer = await blob.arrayBuffer();
  const audioCtx = new AudioContext();
  const audioBuffer = await audioCtx.decodeAudioData(arrayBuffer);
  const { numberOfChannels, length, sampleRate } = audioBuffer;
  const channelData = [];
  for (let ch = 0; ch < numberOfChannels; ch++) {
    channelData[ch] = audioBuffer.getChannelData(ch);
  }

  const silenceSamples = minSilenceDuration * sampleRate;
  let startSample = 0;
  let endSample = length - 1;

  // Find start index
  for (let i = 0; i < length; i++) {
    let maxSample = 0;
    for (let ch = 0; ch < numberOfChannels; ch++) {
      maxSample = Math.max(maxSample, Math.abs(channelData[ch][i]));
    }
    if (maxSample > silenceThreshold) {
      startSample = i;
      break;
    }
  }

  // Find end index
  for (let i = length - 1; i >= 0; i--) {
    let maxSample = 0;
    for (let ch = 0; ch < numberOfChannels; ch++) {
      maxSample = Math.max(maxSample, Math.abs(channelData[ch][i]));
    }
    if (maxSample > silenceThreshold) {
      endSample = i;
      break;
    }
  }

  // Crop the buffer
  const croppedLength = endSample - startSample + 1;
  const newBuffer = audioCtx.createBuffer(
    numberOfChannels,
    croppedLength,
    sampleRate
  );

  for (let ch = 0; ch < numberOfChannels; ch++) {
    newBuffer.copyToChannel(
      channelData[ch].slice(startSample, endSample + 1),
      ch,
      0
    );
  }

  // Convert to Blob
  const trimmedBlob = await bufferToBlob(newBuffer);
  return trimmedBlob;
}

function bufferToBlob(audioBuffer) {
  return new Promise((resolve, reject) => {
    const offlineCtx = new OfflineAudioContext(
      audioBuffer.numberOfChannels,
      audioBuffer.length,
      audioBuffer.sampleRate
    );
    const bufferSource = offlineCtx.createBufferSource();
    bufferSource.buffer = audioBuffer;
    bufferSource.connect(offlineCtx.destination);
    bufferSource.start();

    offlineCtx.startRendering().then(renderedBuffer => {
      const wavData = encodeWAV(renderedBuffer);
      resolve(new Blob([wavData], { type: "audio/wav" }));
    }).catch(reject);
  });
}

// WAV encoder
function encodeWAV(audioBuffer) {
  const numChannels = audioBuffer.numberOfChannels;
  const sampleRate = audioBuffer.sampleRate;
  const format = 1; // PCM
  const bitDepth = 16;
  const samples = flattenBuffer(audioBuffer);
  const dataSize = samples.length * 2;

  const buffer = new ArrayBuffer(44 + dataSize);
  const view = new DataView(buffer);
  writeString(view, 0, 'RIFF');
  view.setUint32(4, 36 + dataSize, true);
  writeString(view, 8, 'WAVE');
  writeString(view, 12, 'fmt ');
  view.setUint32(16, 16, true);
  view.setUint16(20, format, true);
  view.setUint16(22, numChannels, true);
  view.setUint32(24, sampleRate, true);
  view.setUint32(28, sampleRate * numChannels * bitDepth / 8, true);
  view.setUint16(32, numChannels * bitDepth / 8, true);
  view.setUint16(34, bitDepth, true);
  writeString(view, 36, 'data');
  view.setUint32(40, dataSize, true);

  let offset = 44;
  for (let i = 0; i < samples.length; i++, offset += 2) {
    const s = Math.max(-1, Math.min(1, samples[i]));
    view.setInt16(offset, s * 32767, true);
  }

  function writeString(view, offset, string) {
    for (let i = 0; i < string.length; i++) {
      view.setUint8(offset + i, string.charCodeAt(i));
    }
  }

  function flattenBuffer(audioBuffer) {
    const channels = [];
    for (let ch = 0; ch < audioBuffer.numberOfChannels; ch++) {
      channels.push(audioBuffer.getChannelData(ch));
    }
    const length = channels[0].length;
    const result = new Float32Array(length * channels.length);
    for (let i = 0; i < length; i++) {
      for (let ch = 0; ch < channels.length; ch++) {
        result[i * channels.length + ch] = channels[ch][i];
      }
    }
    return result;
  }

  return buffer;
}

/* Save to storage after trimming silence */
const assignBtn = document.getElementById("assignBtn");
assignBtn.onclick = async () => {
  const index = assignSelect.value;
  if (!recordedAudioBlob) {
    showError("No recording to assign");
    return;
  }
  try {
    const base64 = await blobToBase64(recordedAudioBlob);
    localStorage.setItem("audio_" + index, base64);
    console.log("Saved audio for button", index);
    await loadSavedAudio();
    alert("Saved to Button " + (parseInt(index) + 1));
  } catch (err) {
    showError("Error saving audio");
    console.error(err);
  }
};

/* Load all saved audio from localStorage into audioClips array */
async function loadSavedAudio() {
  for (let i = 0; i < 100; i++) {
    const base64 = localStorage.getItem("audio_" + i);
    if (base64) {
      try {
        const blob = base64ToBlob(base64, "audio/webm");
        audioClips[i] = new Audio(URL.createObjectURL(blob));
        console.log("Loaded audio for button", i);
      } catch (err) {
        showError("Error loading audio for Button " + (i + 1));
        console.error("Loading error for button", i, err);
        audioClips[i] = null;
      }
    } else {
      audioClips[i] = null;
    }
  }
}
loadSavedAudio();

/* Utility functions */
function base64ToBlob(base64, mime) {
  const binary = atob(base64);
  const array = [];
  for (let i = 0; i < binary.length; i++) {
    array.push(binary.charCodeAt(i));
  }
  return new Blob([new Uint8Array(array)], {type: mime});
}

/* Volume toggle */
document.getElementById("volume-btn").onclick = () => {
  isMuted = !isMuted;
  document.getElementById("volume-btn").textContent = isMuted ? "🔇" : "🔊";
};
</script>
</body>
