<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>100 Button Audio Board (Cookie Saved)</title>
<style>
    body { font-family: Arial, sans-serif; padding: 20px; }
    #buttons { display: grid; grid-template-columns: repeat(10, 1fr); gap: 10px; margin-top: 20px; }
    button { padding: 15px; font-size: 14px; cursor: pointer; }
    #recording-controls { margin-bottom: 20px; }
</style>
</head>
<body>

<h1>Audio Button Board (with Cookies)</h1>

<h2>Recording Tab</h2>
<div id="recording-controls">
    <button id="startRecord">Start Recording</button>
    <button id="stopRecord" disabled>Stop Recording</button>
    <p id="recordStatus">Not recording.</p>

    <label>
        Program to button:
        <select id="assignSelect"></select>
    </label>
    <button id="assignBtn" disabled>Assign Recording</button>
</div>

<h2>Buttons</h2>
<div id="buttons"></div>

<script>
/* -------------------------
   Cookie Helpers
--------------------------*/
function setCookie(name, value, days = 365) {
    const d = new Date();
    d.setTime(d.getTime() + (days * 86400000));
    document.cookie = `${name}=${value}; expires=${d.toUTCString()}; path=/`;
}

function getCookie(name) {
    const match = document.cookie.match(new RegExp('(^| )' + name + '=([^;]+)'));
    return match ? match[2] : null;
}

/* -------------------------
   Setup: Create 100 buttons
--------------------------*/
const buttonContainer = document.getElementById("buttons");
const assignSelect = document.getElementById("assignSelect");

let audioClips = new Array(100).fill(null);

for (let i = 1; i <= 100; i++) {
    const index = i - 1;

    // Create playback buttons
    const btn = document.createElement("button");
    btn.textContent = "Button " + i;
    btn.dataset.index = index;

    btn.addEventListener("click", () => {
        if (audioClips[index]) audioClips[index].play();
        else alert("No audio assigned to Button " + i);
    });

    buttonContainer.appendChild(btn);

    // Add to dropdown
    const opt = document.createElement("option");
    opt.value = index;
    opt.textContent = "Button " + i;
    assignSelect.appendChild(opt);
}

/* -------------------------
   Load saved audio from cookies
--------------------------*/
for (let i = 0; i < 100; i++) {
    const base64 = getCookie("audio_" + i);
    if (base64) {
        const blob = base64ToBlob(base64, "audio/webm");
        audioClips[i] = new Audio(URL.createObjectURL(blob));
    }
}

/* -------------------------
   Recording Functionality
--------------------------*/
let mediaRecorder;
let chunks = [];
let recordedAudioBlob = null;

const startBtn = document.getElementById("startRecord");
const stopBtn = document.getElementById("stopRecord");
const assignBtn = document.getElementById("assignBtn");
const statusText = document.getElementById("recordStatus");

startBtn.onclick = async () => {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    mediaRecorder = new MediaRecorder(stream);

    chunks = [];
    recordedAudioBlob = null;

    mediaRecorder.ondataavailable = e => chunks.push(e.data);
    mediaRecorder.onstop = () => {
        recordedAudioBlob = new Blob(chunks, { type: "audio/webm" });
        assignBtn.disabled = false;
        statusText.textContent = "Recording complete. Ready to assign.";
    };

    mediaRecorder.start();
    startBtn.disabled = true;
    stopBtn.disabled = false;
    statusText.textContent = "Recording...";
};

stopBtn.onclick = () => {
    mediaRecorder.stop();
    startBtn.disabled = false;
    stopBtn.disabled = true;
};

/* -------------------------
   Assign audio to button & SAVE to cookies
--------------------------*/
assignBtn.onclick = async () => {
    if (!recordedAudioBlob) return;

    const index = assignSelect.value;

    // Create audio object for playback
    audioClips[index] = new Audio(URL.createObjectURL(recordedAudioBlob));

    // Convert to Base64 and store in cookie
    const base64 = await blobToBase64(recordedAudioBlob);
    setCookie("audio_" + index, base64);

    alert("Audio assigned & saved to Button " + (parseInt(index) + 1));
};

/* -------------------------
   Blob <-> Base64 Helpers
--------------------------*/
function blobToBase64(blob) {
    return new Promise(resolve => {
        const reader = new FileReader();
        reader.onloadend = () => resolve(reader.result.split(',')[1]);
        reader.readAsDataURL(blob);
    });
}

function base64ToBlob(base64, mime) {
    const byteChars = atob(base64);
    const byteNumbers = new Array(byteChars.length);
    for (let i = 0; i < byteChars.length; i++) {
        byteNumbers[i] = byteChars.charCodeAt(i);
    }
    return new Blob([new Uint8Array(byteNumbers)], { type: mime });
}
</script>

</body>
</html>
