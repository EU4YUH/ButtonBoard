<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Audio Button Board – Modern UI</title>
<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg-color: #f5f6fa;
    --text-color: #333;
    --primary-color: #4a90e2;
    --secondary-color: #27ae60;
    --hover-bg-color: #f0f0f0;
    --button-bg: #fff;
    --button-shadow: rgba(0,0,0,0.1);
    --panel-bg: #fff;
    --panel-shadow: rgba(0,0,0,0.08);
    --hover-shadow: rgba(0,0,0,0.18);
  }

  /* Theme overrides for different themes, omitted for brevity, include previous theme CSS */

  /* Basic styles */
  body {
    font-family: 'Montserrat', Arial, sans-serif;
    padding: 30px;
    background: var(--bg-color);
    color: var(--text-color);
    margin: 0;
    min-height: 100vh;
    transition: background 0.3s, color 0.3s;
    position: relative;
  }

  /* Error message styling */
  #errorMessage {
    position: fixed;
    top: 20px;
    right: 20px;
    background: #ff4d4f;
    color: white;
    padding: 12px 20px;
    border-radius: 8px;
    box-shadow: 0 4px 8px rgba(0,0,0,0.2);
    font-weight: 600;
    z-index: 9999;
    max-width: 300px;
    display: none;
    font-family: 'Montserrat', sans-serif;
  }

  /* Logo/header styling */
  #logo-container {
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 20px;
  }
  #logo {
    height: 60px;
    width: 60px;
    margin-right: 15px;
  }
  #logo-text {
    font-size: 2em;
    font-weight: 600;
    letter-spacing: 1px;
    font-family: 'Montserrat', sans-serif;
    color: var(--primary-color);
  }

  /* Theme selector styling */
  #themeSelect {
    position: fixed;
    top: 20px;
    right: 80px;
    padding: 8px 12px;
    border-radius: 8px;
    border: 1px solid #ccc;
    font-size: 14px;
    cursor: pointer;
    transition: box-shadow 0.2s, transform 0.2s;
    z-index: 10;
  }
  #themeSelect:hover {
    box-shadow: 0 4px 8px rgba(0,0,0,0.2);
    transform: scale(1.02);
  }

  /* Volume button styles */
  #volume-btn {
    position: fixed;
    top: 20px;
    right: 20px;
    background: var(--primary-color);
    border: none;
    border-radius: 50%;
    width: 50px;
    height: 50px;
    cursor: pointer;
    box-shadow: 0 4px 8px rgba(0,0,0,0.2);
    font-size: 18px;
    color: white;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.2s, transform 0.2s, box-shadow 0.2s;
  }
  #volume-btn:hover {
    background: var(--hover-bg-color);
    box-shadow: 0 6px 16px rgba(0,0,0,0.3);
    transform: scale(1.05);
  }

  /* Main headings */
  h1 {
    text-align: center;
    font-weight: 600;
    letter-spacing: 1px;
    margin-bottom: 20px;
    font-size: 2em;
  }

  h2 {
    margin-top: 30px;
    font-weight: 500;
    border-left: 5px solid var(--primary-color);
    padding-left: 10px;
    color: var(--primary-color);
    font-size: 1.5em;
  }

  /* Panels style */
  .panel {
    background: var(--panel-bg);
    padding: 20px;
    margin-top: 15px;
    border-radius: 12px;
    box-shadow: 0 3px 10px var(--panel-shadow);
    transition: box-shadow 0.3s, transform 0.3s;
  }
  .panel:hover {
    box-shadow: 0 8px 20px var(--hover-shadow);
    transform: translateY(-2px);
  }

  /* Button grid styles */
  #buttons {
    display: grid;
    grid-template-columns: repeat(10, 1fr);
    gap: 12px;
    margin-top: 20px;
  }
  #buttons button {
    padding: 16px;
    font-size: 14px;
    border-radius: 10px;
    border: none;
    background: var(--button-bg);
    box-shadow: 0 2px 6px var(--button-shadow);
    transition: transform 0.1s, box-shadow 0.2s, background-color 0.2s;
    cursor: pointer;
    white-space: nowrap;
    font-weight: 500;
    position: relative;
    overflow: hidden;
  }
  #buttons button:hover {
    transform: translateY(-3px);
    box-shadow: 0 4px 12px var(--hover-shadow);
    background-color: var(--hover-bg-color);
  }

  /* Recording controls styles */
  #recording-controls button {
    padding: 10px 16px;
    border-radius: 8px;
    border: none;
    margin-right: 10px;
    font-size: 14px;
    cursor: pointer;
    background: var(--primary-color);
    color: white;
    transition: background 0.2s, transform 0.2s;
  }
  #recording-controls button:disabled {
    background: #9bbfe9;
    cursor: default;
    opacity: 0.6;
  }
  #recording-controls button:hover:not(:disabled) {
    background: #3574c9;
    transform: scale(1.05);
  }

  /* Customizer styles */
  #customizer {
    display: flex;
    flex-wrap: wrap;
    gap: 15px;
    align-items: center;
    margin-top: 15px;
  }
  #saveCustom {
    padding: 10px 16px;
    background: var(--secondary-color);
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    transition: background 0.2s, transform 0.2s;
    font-size: 14px;
  }
  #saveCustom:hover {
    background: #1f8c4c;
    transform: scale(1.05);
  }
  /* Inputs styling */
  select, input[type="text"], input[type="color"] {
    padding: 8px;
    border-radius: 8px;
    border: 1px solid #ccc;
    background: #fff;
    font-size: 14px;
    transition: box-shadow 0.2s;
  }
  select:focus, input[type="text"]:focus, input[type="color"]:focus {
    box-shadow: 0 0 8px rgba(74, 144, 226, 0.5);
    outline: none;
  }
</style>
</head>
<body>

<!-- Error message container -->
<div id="errorMessage"></div>

<!-- Header with logo and title -->
<div id="logo-container">
  <img id="logo" src="https://via.placeholder.com/60?text=🎵" alt="Logo" />
  <div id="logo-text">Audio Button Board</div>
</div>

<!-- Theme selector -->
<select id="themeSelect" title="Choose Theme">
  <option value="light">Light</option>
  <option value="dark">Dark</option>
  <option value="colorful">Colorful</option>
  <option value="vibrant">Vibrant</option>
  <option value="pastel">Pastel</option>
  <option value="metallic">Metallic</option>
</select>

<!-- Volume toggle button -->
<button id="volume-btn" title="Toggle Mute">🔊</button>

<h2>Recording</h2>
<div id="recording-controls" class="panel">
    <button id="startRecord">Start Recording</button>
    <button id="stopRecord" disabled>Stop Recording</button>
    <p id="recordStatus">Not recording.</p>
    <label>
        Program to button:
        <select id="assignSelect"></select>
    </label>
    <button id="assignBtn" disabled>Assign Recording</button>
</div>

<h2>Customize Buttons</h2>
<div id="customizer" class="panel">
    <label>
        Select Button:
        <select id="customSelect"></select>
    </label>
    <label>
        Name:
        <input type="text" id="customName" />
    </label>
    <label>
        Color:
        <input type="color" id="customColor" />
    </label>
    <button id="saveCustom">Save Changes</button>
</div>

<h2>Soundboard</h2>
<div id="buttons" class="panel"></div>

<script>
// ------------------------ Theme management ----------------------------------
// (Insert full theme code here, same as previous, omitted for brevity)

/* Initialize theme */
const themeSelect = document.getElementById('themeSelect');
const themes = {
  // ... your themes object ...
};
function applyTheme(themeName) {
  document.body.className = '';
  document.body.classList.remove('theme-vibrant', 'theme-pastel', 'theme-metallic');
  document.body.classList.add(`theme-${themeName}`);
  const theme = themes[themeName];
  for (let varName in theme) {
    document.documentElement.style.setProperty(varName, theme[varName]);
  }
}
const savedTheme = localStorage.getItem('theme') || 'light';
applyTheme(savedTheme);
document.getElementById('themeSelect').value = savedTheme;
for (const themeName in themes) {
  // populate options
}
// ... rest of theme setup ...

// ------------------------ Create 100 Buttons ----------------------------------
const buttonContainer = document.getElementById("buttons");
const assignSelect = document.getElementById("assignSelect");
const customSelect = document.getElementById("customSelect");
const volumeBtn = document.getElementById("volume-btn");
const errorDiv = document.getElementById('errorMessage');

let audioClips = new Array(100).fill(null);
let buttons = [];
let buttonData = JSON.parse(localStorage.getItem("buttonData") || "{}");
let isMuted = false;

// Show error function
function showError(msg) {
  errorDiv.textContent = msg;
  errorDiv.style.display = 'block';
  setTimeout(() => { errorDiv.style.display = 'none'; }, 5000);
}

// Generate buttons
for (let i = 1; i <= 100; i++) {
  const idx = i - 1;
  const btn = document.createElement("button");
  btn.textContent = buttonData[idx]?.name || ("Button " + i);
  btn.style.backgroundColor = buttonData[idx]?.color || "";
  btn.dataset.index = idx;
  btn.onclick = () => {
    if (audioClips[idx]) {
      if (!isMuted) {
        try {
          audioClips[idx].play();
        } catch(e){ showError("Error playing Button " + (idx+1)); console.error(e);}
      }
    } else {
      showError("No audio saved for Button " + (idx+1));
    }
  };
  buttonContainer.appendChild(btn);
  buttons[idx] = btn;

  // populate dropdowns
  const opt = document.createElement("option");
  opt.value = idx;
  opt.textContent = "Button " + i;
  assignSelect.appendChild(opt);
  const opt2 = document.createElement("option");
  opt2.value = idx;
  opt2.textContent = "Button " + i;
  customSelect.appendChild(opt2);
}

// Load saved audio
async function loadSavedAudio() {
  for(let i=0; i<100; i++){
    const base64 = localStorage.getItem("audio_"+i);
    if(base64){
      try{
        const blob = base64ToBlob(base64,"audio/webm");
        audioClips[i] = new Audio(URL.createObjectURL(blob));
        console.log("Loaded audio for button",i);
      } catch(e){ showError("Error loading audio for Button "+(i+1)); console.error("Load error",i,e);}
    } else {
      audioClips[i] = null;
    }
  }
}
loadSavedAudio();

// ---------------------- Recording with silence crop --------------------------
let mediaRecorder;
let chunks = [];
let recordedBlob = null;

const startBtn = document.getElementById("startRecord");
const stopBtn = document.getElementById("stopRecord");
const assignBtn = document.getElementById("assignBtn");
const recordStatus = document.getElementById("recordStatus");

startBtn.onclick = async () => {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio:true });
    mediaRecorder = new MediaRecorder(stream);
    chunks = [];
    recordedBlob = null;
    mediaRecorder.ondataavailable = e => { chunks.push(e.data); };
    mediaRecorder.onstop = async () => {
      const rawBlob = new Blob(chunks, {type: "audio/webm"});
      try{
        const trimmed = await trimSilence(rawBlob);
        recordedBlob = trimmed;
        assignBtn.disabled = false;
        recordStatus.textContent = "Finished. Ready to assign.";
      } catch(e){ showError("Error trimming silence"); console.error(e);}
    };
    mediaRecorder.start();
    startBtn.disabled=true; stopBtn.disabled=false;
    recordStatus.textContent = "Recording...";
  } catch(e){ showError("Microphone access error"); console.error(e);}
}

document.getElementById("stopRecord").onclick = () => {
  if(mediaRecorder && mediaRecorder.state !== "inactive"){
    try{
      mediaRecorder.stop();
      startBtn.disabled=false; stopBtn.disabled=true;
    } catch(e){ showError("Error stopping"); console.error(e);}
  }
}

// Save to localStorage
const blobToBase64 = (blob) => {
  return new Promise((resolve) => {
    const reader = new FileReader();
    reader.onloadend = () => { resolve(reader.result.split(",")[1]); };
    reader.readAsDataURL(blob);
  });
}

async function trimSilence(blob, threshold=0.02, minDur=0.2){
  const arrayBuffer = await blob.arrayBuffer();
  const ctx = new AudioContext();
  const buf = await ctx.decodeAudioData(arrayBuffer);
  const {numberOfChannels, length, sampleRate} = buf;
  const chData = [];
  for(let ch=0; ch<numberOfChannels; ch++) chData[ch] = buf.getChannelData(ch);
  const minSamples = minDur * sampleRate;

  let startSample=0, endSample=length-1;
  // find start
  for(let i=0; i<length; i++){
    let maxAmp=0;
    for(let ch=0; ch<numberOfChannels; ch++){
      maxAmp = Math.max(maxAmp, Math.abs(chData[ch][i]));
    }
    if(maxAmp > threshold){ startSample=i; break; }
  }
  // find end
  for(let i=length-1; i>=0; i--){
    let maxAmp=0;
    for(let ch=0; ch<numberOfChannels; ch++){
      maxAmp = Math.max(maxAmp, Math.abs(chData[ch][i]));
    }
    if(maxAmp > threshold){ endSample=i; break; }
  }
  // crop buffer
  const cropLength = endSample - startSample +1;
  const newBuf = ctx.createBuffer(numberOfChannels, cropLength, sampleRate);
  for(let ch=0; ch<numberOfChannels; ch++){
    newBuf.copyToChannel(chData[ch].slice(startSample,endSample+1), ch, 0);
  }
  return await bufferToBlob(newBuf);
}

function bufferToBlob(audioBuffer){
  return new Promise((resolve,reject) => {
    const ctx = new OfflineAudioContext(audioBuffer.numberOfChannels, audioBuffer.length, audioBuffer.sampleRate);
    const src = ctx.createBufferSource();
    src.buffer=audioBuffer;
    src.connect(ctx.destination);
    src.start();
    ctx.startRendering().then(rendered => {
      const wav = encodeWAV(rendered);
      resolve(new Blob([wav], {type:"audio/wav"}));
    }).catch(reject);
  });
}

function encodeWAV(audioBuffer){
  const numCh = audioBuffer.numberOfChannels;
  const sampleRate = audioBuffer.sampleRate;
  const samples = flattenBuffer(audioBuffer);
  const buffer = new ArrayBuffer(44+samples.length*2);
  const view=new DataView(buffer);
  writeString(view,0,'RIFF');
  view.setUint32(4,36+samples.length*2,true);
  writeString(view,8,'WAVE');
  writeString(view,12,'fmt ');
  view.setUint32(16,16,true);
  view.setUint16(20,1,true);
  view.setUint16(22,numCh,true);
  view.setUint32(24,sampleRate,true);
  view.setUint32(28,sampleRate*numCh*16/8,true);
  view.setUint16(32,numCh*16/8,true);
  view.setUint16(34,16,true);
  writeString(view,36,'data');
  view.setUint32(40,samples.length*2,true);
  let offset=44;
  for(let i=0;i<samples.length;i++, offset+=2){
    const s=Math.max(-1, Math.min(1, samples[i]));
    view.setInt16(offset, s*32767,true);
  }
  function writeString(view, offset, str){
    for(let i=0;i<str.length;i++) view.setUint8(offset+i, str.charCodeAt(i));
  }
  function flattenBuffer(abuf){
    const chans=[];
    for(let ch=0; ch<abuf.numberOfChannels; ch++){
      chans.push(abuf.getChannelData(ch));
    }
    const len=chans[0].length;
    const result=new Float32Array(len*chans.length);
    for(let i=0;i<len;i++){
      for(let ch=0; ch<chans.length; ch++){
        result[i*chans.length+ch]=chans[ch][i];
      }
    }
    return result;
  }
  return buffer;
}

// Save assigned recording
document.getElementById("assignBtn").onclick= async () => {
  const index= assignSelect.value;
  if(!recordedBlob){ showError("No recording to save"); return; }
  try{
    const base64 = await blobToBase64(recordedBlob);
    localStorage.setItem("audio_"+index, base64);
    console.log("Saved audio for button", index);
    await loadSavedAudio(); // reload all clips
    alert("Saved to Button " + (parseInt(index)+1));
  } catch(e){ showError("Error saving audio"); console.error(e);}
}

// Load all saved audio
async function loadSavedAudio() {
  for(let i=0; i<100; i++){
    const base64= localStorage.getItem("audio_"+i);
    if(base64){
      try{
        const blob= base64ToBlob(base64,"audio/webm");
        audioClips[i]= new Audio(URL.createObjectURL(blob));
        console.log("Loaded audio for button",i);
      }catch(e){ showError("Error loading audio for Button "+(i+1)); console.error("Load error",i,e); audioClips[i]=null; }
    } else {
      audioClips[i]=null;
    }
  }
}
loadSavedAudio();

// Utility
function base64ToBlob(base64, mime){
  const bin=atob(base64);
  const arr=new Uint8Array(bin.length);
  for(let i=0; i<bin.length; i++) arr[i]=bin.charCodeAt(i);
  return new Blob([arr], {type: mime});
}

// Mute toggle
document.getElementById("volume-btn").onclick=()=>{
  isMuted=!isMuted;
  document.getElementById("volume-btn").textContent= isMuted ? "🔇" : "🔊";
};
</script>
</body>
</html>
