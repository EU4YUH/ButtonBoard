<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Audio Button Board – Modern UI</title>
<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg-color: #f5f6fa;
    --text-color: #333;
    --primary-color: #4a90e2;
    --secondary-color: #27ae60;
    --hover-bg-color: #f0f0f0;
    --button-bg: #fff;
    --button-shadow: rgba(0,0,0,0.1);
    --panel-bg: #fff;
    --panel-shadow: rgba(0,0,0,0.08);
    --hover-shadow: rgba(0,0,0,0.18);
  }

  /* Theme overrides for different themes, omitted for brevity, include previous theme CSS */

  /* Basic styles */
  body {
    font-family: 'Montserrat', Arial, sans-serif;
    padding: 30px;
    background: var(--bg-color);
    color: var(--text-color);
    margin: 0;
    min-height: 100vh;
    transition: background 0.3s, color 0.3s, opacity 0.5s;
    position: relative;
  }

  /* Fade class for theme transition */
  body.fade {
    opacity: 0;
  }

  /* Error message styling */
  #errorMessage {
    position: fixed;
    top: 20px;
    right: 20px;
    background: #ff4d4f;
    color: white;
    padding: 12px 20px;
    border-radius: 8px;
    box-shadow: 0 4px 8px rgba(0,0,0,0.2);
    font-weight: 600;
    z-index: 9999;
    max-width: 300px;
    display: none;
    font-family: 'Montserrat', sans-serif;
  }

  /* Logo/header styling */
  #logo-container {
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 20px;
  }
  #logo {
    height: 60px;
    width: 60px;
    margin-right: 15px;
  }
  #logo-text {
    font-size: 2em;
    font-weight: 600;
    letter-spacing: 1px;
    font-family: 'Montserrat', sans-serif;
    color: var(--primary-color);
  }

  /* Theme selector styling */
  #themeSelect {
    position: fixed;
    top: 20px;
    right: 80px;
    padding: 8px 12px;
    border-radius: 8px;
    border: 1px solid #ccc;
    font-size: 14px;
    cursor: pointer;
    transition: box-shadow 0.2s, transform 0.2s;
    z-index: 10;
  }
  #themeSelect:hover {
    box-shadow: 0 4px 8px rgba(0,0,0,0.2);
    transform: scale(1.02);
  }

  /* Volume button styles */
  #volume-btn {
    position: fixed;
    top: 20px;
    right: 20px;
    background: var(--primary-color);
    border: none;
    border-radius: 50%;
    width: 50px;
    height: 50px;
    cursor: pointer;
    box-shadow: 0 4px 8px rgba(0,0,0,0.2);
    font-size: 18px;
    color: white;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.2s, transform 0.2s, box-shadow 0.2s;
  }
  #volume-btn:hover {
    background: var(--hover-bg-color);
    box-shadow: 0 6px 16px rgba(0,0,0,0.3);
    transform: scale(1.05);
  }

  /* Main headings */
  h1 {
    text-align: center;
    font-weight: 600;
    letter-spacing: 1px;
    margin-bottom: 20px;
    font-size: 2em;
  }

  h2 {
    margin-top: 30px;
    font-weight: 500;
    border-left: 5px solid var(--primary-color);
    padding-left: 10px;
    color: var(--primary-color);
    font-size: 1.5em;
  }

  /* Panels style */
  .panel {
    background: var(--panel-bg);
    padding: 20px;
    margin-top: 15px;
    border-radius: 12px;
    box-shadow: 0 3px 10px var(--panel-shadow);
    transition: box-shadow 0.3s, transform 0.3s;
  }
  .panel:hover {
    box-shadow: 0 8px 20px var(--hover-shadow);
    transform: translateY(-2px);
  }

  /* Button grid styles */
  #buttons {
    display: grid;
    grid-template-columns: repeat(10, 1fr);
    gap: 12px;
    margin-top: 20px;
  }
  #buttons button {
    padding: 16px;
    font-size: 14px;
    border-radius: 10px;
    border: none;
    background: var(--button-bg);
    box-shadow: 0 2px 6px var(--button-shadow);
    transition: transform 0.1s, box-shadow 0.2s, background-color 0.2s;
    cursor: pointer;
    white-space: nowrap;
    font-weight: 500;
    position: relative;
    overflow: hidden;
  }
  #buttons button:hover {
    transform: translateY(-3px);
    box-shadow: 0 4px 12px var(--hover-shadow);
    background-color: var(--hover-bg-color);
  }

  /* Recording controls styles */
  #recording-controls button {
    padding: 10px 16px;
    border-radius: 8px;
    border: none;
    margin-right: 10px;
    font-size: 14px;
    cursor: pointer;
    background: var(--primary-color);
    color: white;
    transition: background 0.2s, transform 0.2s;
  }
  #recording-controls button:disabled {
    background: #9bbfe9;
    cursor: default;
    opacity: 0.6;
  }
  #recording-controls button:hover:not(:disabled) {
    background: #3574c9;
    transform: scale(1.05);
  }

  /* Customizer styles */
  #customizer {
    display: flex;
    flex-wrap: wrap;
    gap: 15px;
    align-items: center;
    margin-top: 15px;
  }
  #saveCustom {
    padding: 10px 16px;
    background: var(--secondary-color);
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    transition: background 0.2s, transform 0.2s;
    font-size: 14px;
  }
  #saveCustom:hover {
    background: #1f8c4c;
    transform: scale(1.05);
  }
  /* Inputs styling */
  select, input[type="text"], input[type="color"] {
    padding: 8px;
    border-radius: 8px;
    border: 1px solid #ccc;
    background: #fff;
    font-size: 14px;
    transition: box-shadow 0.2s;
  }
  select:focus, input[type="text"]:focus, input[type="color"]:focus {
    box-shadow: 0 0 8px rgba(74, 144, 226, 0.5);
    outline: none;
  }
</style>
</head>
<body>

<!-- Error message container -->
<div id="errorMessage"></div>

<!-- Header with logo and title -->
<div id="logo-container">
  <img id="logo" src="https://via.placeholder.com/60?text=🎵" alt="Logo" />
  <div id="logo-text">Audio Button Board</div>
</div>

<!-- Theme selector -->
<select id="themeSelect" title="Choose Theme">
  <option value="light">Light</option>
  <option value="dark">Dark</option>
  <option value="colorful">Colorful</option>
  <option value="vibrant">Vibrant</option>
  <option value="pastel">Pastel</option>
  <option value="metallic">Metallic</option>
</select>

<!-- Volume toggle button -->
<button id="volume-btn" title="Toggle Mute">🔊</button>

<h2>Recording</h2>
<div id="recording-controls" class="panel">
    <button id="startRecord">Start Recording</button>
    <button id="stopRecord" disabled>Stop Recording</button>
    <p id="recordStatus">Not recording.</p>
    <label>
        Program to button:
        <select id="assignSelect"></select>
    </label>
    <button id="assignBtn" disabled>Assign Recording</button>
</div>

<h2>Customize Buttons</h2>
<div id="customizer" class="panel">
    <label>
        Select Button:
        <select id="customSelect"></select>
    </label>
    <label>
        Name:
        <input type="text" id="customName" />
    </label>
    <label>
        Color:
        <input type="color" id="customColor" />
    </label>
    <button id="saveCustom">Save Changes</button>
</div>

<h2>Soundboard</h2>
<div id="buttons" class="panel"></div>

<script>
// ------------------------ Theme management ----------------------------------
// Keep your original theme code intact, just add more themes below

// Define themes object with multiple themes
const themes = {
  light: {
    '--bg-color': '#f5f6fa',
    '--text-color': '#333',
    '--primary-color': '#4a90e2',
    '--secondary-color': '#27ae60',
    '--hover-bg-color': '#f0f0f0',
    '--button-bg': '#fff',
    '--panel-bg': '#fff',
    '--panel-shadow': 'rgba(0,0,0,0.08)',
    '--hover-shadow': 'rgba(0,0,0,0.18)',
  },
  dark: {
    '--bg-color': '#222',
    '--text-color': '#eee',
    '--primary-color': '#e94e4e',
    '--secondary-color': '#f39c12',
    '--hover-bg-color': '#444',
    '--button-bg': '#333',
    '--panel-bg': '#2c2c2c',
    '--panel-shadow': 'rgba(0,0,0,0.4)',
    '--hover-shadow': 'rgba(0,0,0,0.6)',
  },
  colorful: {
    '--bg-color': '#ffe4e1',
    '--text-color': '#333',
    '--primary-color': '#ff69b4',
    '--secondary-color': '#ffeb3b',
    '--hover-bg-color': '#ffd1dc',
    '--button-bg': '#fff',
    '--panel-bg': '#fff',
    '--panel-shadow': 'rgba(0,0,0,0.1)',
    '--hover-shadow': 'rgba(0,0,0,0.2)',
  },
  vibrant: {
    '--bg-color': '#00ffcc',
    '--text-color': '#000',
    '--primary-color': '#ff00cc',
    '--secondary-color': '#ffff00',
    '--hover-bg-color': '#66ffe0',
    '--button-bg': '#fff',
    '--panel-bg': '#fff',
    '--panel-shadow': 'rgba(0,0,0,0.05)',
    '--hover-shadow': 'rgba(0,0,0,0.15)',
  },
  pastel: {
    '--bg-color': '#faf0e6',
    '--text-color': '#555',
    '--primary-color': '#ffb3ba',
    '--secondary-color': '#bae1ff',
    '--hover-bg-color': '#f0e0d5',
    '--button-bg': '#ffe4e1',
    '--panel-bg': '#ffe4e1',
    '--panel-shadow': 'rgba(0,0,0,0.05)',
    '--hover-shadow': 'rgba(0,0,0,0.1)',
  },
  metallic: {
    '--bg-color': '#d0d0d0',
    '--text-color': '#222',
    '--primary-color': '#b0b0b0',
    '--secondary-color': '#707070',
    '--hover-bg-color': '#a0a0a0',
    '--button-bg': '#999',
    '--panel-bg': '#b0b0b0',
    '--panel-shadow': 'rgba(0,0,0,0.2)',
    '--hover-shadow': 'rgba(0,0,0,0.3)',
  }
};

// Function to apply theme with animation
function applyTheme(themeName) {
  // Add fade class for transition
  document.body.classList.add('fade');

  // Wait for transition to complete, then change theme
  setTimeout(() => {
    // Remove existing theme classes
    document.body.className = '';
    // Add fade class again to trigger fade-in after theme change
    document.body.classList.add('fade');

    // Apply new theme variables
    const theme = themes[themeName];
    for (let varName in theme) {
      document.documentElement.style.setProperty(varName, theme[varName]);
    }

    // Remove the fade class after a short delay to fade in
    setTimeout(() => {
      document.body.classList.remove('fade');
    }, 50);
  }, 300);
}

// Initialize theme
const themeSelect = document.getElementById('themeSelect');
const savedTheme = localStorage.getItem('theme') || 'light';
applyTheme(savedTheme);
themeSelect.value = savedTheme;

// Handle theme change
themeSelect.onchange = () => {
  const selectedTheme = themeSelect.value;
  localStorage.setItem('theme', selectedTheme);
  applyTheme(selectedTheme);
};
</script>
</body>
</html>
