<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dynamic Audio Button Board</title>
<style>
    body { font-family: Arial, sans-serif; padding: 20px; background: #f5f5f5; color: #333; }
    h1 { text-align: center; color: #2c3e50; }
    h2 { margin-top: 30px; color: #34495e; }

    #buttons { display: grid; grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); gap: 10px; margin-top: 20px; }
    button.audio-btn { padding: 15px; font-size: 14px; cursor: pointer; border: none; border-radius: 8px; background: #3498db; color: white; transition: 0.2s; }
    button.audio-btn:hover { background: #2980b9; }

    .panel { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; margin-bottom: 20px; }
    .panel button { padding: 10px 16px; border-radius: 8px; border: none; cursor: pointer; color: white; transition: 0.2s; }
    #startRecord { background: #27ae60; } #startRecord:hover { background: #1e8449; }
    #stopRecord { background: #e67e22; } #stopRecord:hover { background: #d35400; }
    #assignBtn { background: #8e44ad; } #assignBtn:hover { background: #71368a; }
    #addButton { background: #27ae60; } #addButton:hover { background: #1e8449; }
    #removeButton { background: #e74c3c; } #removeButton:hover { background: #c0392b; }

    select, input[type=text], input[type=color] { padding: 5px; border-radius: 4px; border: 1px solid #ccc; }
    label { display: flex; align-items: center; gap: 5px; }

    #recordStatus { font-weight: bold; margin-left: 10px; }
</style>
</head>
<body>

<h1>Dynamic Audio Button Board</h1>

<h2>Recording Controls</h2>
<div id="recording-controls" class="panel">
    <button id="startRecord">Start Recording</button>
    <button id="stopRecord" disabled>Stop Recording</button>
    <span id="recordStatus">Not recording.</span>

    <label>
        Assign to:
        <select id="assignSelect"></select>
    </label>
    <button id="assignBtn" disabled>Assign Recording</button>
</div>

<h2>Customize Buttons</h2>
<div id="customize-controls" class="panel">
    <label>
        Button:
        <select id="customSelect"></select>
    </label>
    <label>
        Name:
        <input type="text" id="customName" placeholder="Button Name">
    </label>
    <label>
        Color:
        <input type="color" id="customColor" value="#3498db">
    </label>
    <button id="saveCustom">Save</button>
</div>

<h2>Manage Buttons</h2>
<div id="buttonManager" class="panel">
    <button id="addButton">Add Button</button>
    <label>
        Remove:
        <select id="removeSelect"></select>
    </label>
    <button id="removeButton">Remove</button>
</div>

<h2>Buttons</h2>
<div id="buttons"></div>

<script>
let audioClips = [];
let buttons = [];
let buttonData = JSON.parse(localStorage.getItem("buttonData") || "{}");
let buttonCount = parseInt(localStorage.getItem("buttonCount") || "20");
let recordedAudioBlob = null;

// DOM Elements
const buttonContainer = document.getElementById("buttons");
const assignSelect = document.getElementById("assignSelect");
const customSelect = document.getElementById("customSelect");
const customName = document.getElementById("customName");
const customColor = document.getElementById("customColor");
const recordStatus = document.getElementById("recordStatus");
const startBtn = document.getElementById("startRecord");
const stopBtn = document.getElementById("stopRecord");
const assignBtn = document.getElementById("assignBtn");
const saveCustomBtn = document.getElementById("saveCustom");
const addBtn = document.getElementById("addButton");
const removeBtn = document.getElementById("removeButton");
const removeSelect = document.getElementById("removeSelect");

let mediaRecorder;
let chunks = [];

// -------------------------
// Build Buttons Dynamically
// -------------------------
function buildButtons() {
    buttonContainer.innerHTML = "";
    assignSelect.innerHTML = "";
    customSelect.innerHTML = "";
    removeSelect.innerHTML = "";
    buttons = [];

    for (let i = 0; i < buttonCount; i++) {
        const data = buttonData[i] || { name: "Button " + (i+1), color: "#3498db" };
        const btn = document.createElement("button");
        btn.className = "audio-btn";
        btn.textContent = data.name;
        btn.style.backgroundColor = data.color;

        btn.addEventListener("click", () => {
            if (audioClips[i]) audioClips[i].play();
            else alert("No audio saved for this button.");
        });

        buttonContainer.appendChild(btn);
        buttons.push(btn);

        // Dropdowns
        assignSelect.appendChild(new Option(data.name, i));
        customSelect.appendChild(new Option(data.name, i));
        removeSelect.appendChild(new Option(data.name, i));
    }

    // Load last selected custom if exists
    if (customSelect.value) updateCustomInputs(customSelect.value);

    saveState();
}
buildButtons();

// -------------------------
// Update Custom Inputs
// -------------------------
function updateCustomInputs(index) {
    const data = buttonData[index] || { name: "Button " + (parseInt(index)+1), color: "#3498db" };
    customName.value = data.name;
    customColor.value = data.color;
}
customSelect.addEventListener("change", () => {
    updateCustomInputs(customSelect.value);
});

// -------------------------
// Save Custom Name/Color
// -------------------------
saveCustomBtn.onclick = () => {
    const index = customSelect.value;
    buttonData[index] = { name: customName.value, color: customColor.value };
    buildButtons();
};

// -------------------------
// Add / Remove Buttons
// -------------------------
addBtn.onclick = () => {
    buttonData[buttonCount] = { name: "Button " + (buttonCount+1), color: "#3498db" };
    audioClips.push(null);
    buttonCount++;
    buildButtons();
};

removeBtn.onclick = () => {
    const index = parseInt(removeSelect.value);
    audioClips.splice(index,1);
    delete buttonData[index];

    // Repack keys
    const newData = {};
    let newIndex = 0;
    for (let key in buttonData) newData[newIndex++] = buttonData[key];
    buttonData = newData;

    buttonCount--;
    buildButtons();
};

// -------------------------
// Recording Audio
// -------------------------
startBtn.onclick = async () => {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    mediaRecorder = new MediaRecorder(stream);
    chunks = [];
    recordedAudioBlob = null;

    mediaRecorder.ondataavailable = e => chunks.push(e.data);
    mediaRecorder.onstop = () => {
        recordedAudioBlob = new Blob(chunks, { type: "audio/webm" });
        assignBtn.disabled = false;
        recordStatus.textContent = "Recording finished. Ready to assign.";
    };

    mediaRecorder.start();
    startBtn.disabled = true;
    stopBtn.disabled = false;
    recordStatus.textContent = "Recording...";
};

stopBtn.onclick = () => {
    mediaRecorder.stop();
    startBtn.disabled = false;
    stopBtn.disabled = true;
};

// -------------------------
// Assign Audio
// -------------------------
assignBtn.onclick = async () => {
    if (!recordedAudioBlob) return;
    const index = assignSelect.value;

    audioClips[index] = new Audio(URL.createObjectURL(recordedAudioBlob));

    const base64 = await blobToBase64(recordedAudioBlob);
    buttonData[index] = buttonData[index] || { name: "Button " + (parseInt(index)+1), color: "#3498db" };
    buttonData[index].audio = base64;

    buildButtons();
    alert("Audio assigned to " + buttonData[index].name);
};

// -------------------------
// Load Saved Audio
// -------------------------
function loadSavedAudio() {
    for (let i = 0; i < buttonCount; i++) {
        if (buttonData[i]?.audio) {
            const blob = base64ToBlob(buttonData[i].audio, "audio/webm");
            audioClips[i] = new Audio(URL.createObjectURL(blob));
        } else {
            audioClips[i] = null;
        }
    }
}
loadSavedAudio();

// -------------------------
// Helpers
// -------------------------
function blobToBase64(blob) {
    return new Promise(resolve => {
        const reader = new FileReader();
        reader.onloadend = () => resolve(reader.result.split(",")[1]);
        reader.readAsDataURL(blob);
    });
}

function base64ToBlob(base64, mime) {
    const bytes = atob(base64);
    const arr = new Uint8Array(bytes.length);
    for (let i=0; i<bytes.length; i++) arr[i] = bytes.charCodeAt(i);
    return new Blob([arr], { type: mime });
}

// -------------------------
// Save State
// -------------------------
function saveState() {
    localStorage.setItem("buttonData", JSON.stringify(buttonData));
    localStorage.setItem("buttonCount", buttonCount);
}

// Save automatically every 5 seconds
setInterval(saveState, 5000);

</script>
</body>
</html>
