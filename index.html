<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Audio Button Board – Modern UI</title>
<!-- Optional: Link to Google Fonts for a modern font -->
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg-color: #f5f6fa;
    --text-color: #333;
    --primary-color: #4a90e2;
    --secondary-color: #27ae60;
    --hover-bg-color: #f0f0f0;
    --button-bg: #fff;
    --button-shadow: rgba(0,0,0,0.1);
    --panel-bg: #fff;
    --panel-shadow: rgba(0,0,0,0.08);
    --hover-shadow: rgba(0,0,0,0.18);
  }

  /* Extended themes with classes */
  :root.theme-vibrant {
    --bg-color: #ffe600;
    --text-color: #222;
    --primary-color: #ff3b00;
    --secondary-color: #00b4d8;
    --hover-bg-color: #ffe600;
    --button-bg: linear-gradient(135deg, #ff3b00, #00b4d8);
    --button-shadow: rgba(0,0,0,0.2);
    --panel-bg: #fff8dc;
    --panel-shadow: rgba(0,0,0,0.1);
    --hover-shadow: rgba(0,0,0,0.2);
  }

  :root.theme-pastel {
    --bg-color: #f8e2f9;
    --text-color: #555;
    --primary-color: #a7c7e7;
    --secondary-color: #f7c59f;
    --hover-bg-color: #f7c59f;
    --button-bg: #fde2e2;
    --button-shadow: rgba(0,0,0,0.1);
    --panel-bg: #fff0f5;
    --panel-shadow: rgba(0,0,0,0.08);
    --hover-shadow: rgba(0,0,0,0.15);
  }

  :root.theme-metallic {
    --bg-color: #1c1c1c;
    --text-color: #e0e0e0;
    --primary-color: #b0c4de;
    --secondary-color: #ffd700;
    --hover-bg-color: #333;
    --button-bg: linear-gradient(135deg, #b0c4de, #ffd700);
    --button-shadow: rgba(0,0,0,0.4);
    --panel-bg: #2b2b2b;
    --panel-shadow: rgba(0,0,0,0.5);
    --hover-shadow: rgba(0,0,0,0.7);
  }

  body {
    font-family: 'Montserrat', Arial, sans-serif;
    padding: 30px;
    background: var(--bg-color);
    color: var(--text-color);
    margin: 0;
    min-height: 100vh;
    transition: background 0.3s, color 0.3s;
  }

  /* Logo/Header Section with your provided image */
  #logo-container {
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 20px;
  }
  #logo {
    height: 60px;
    width: 60px;
    margin-right: 15px;
  }
  #logo-text {
    font-size: 2em;
    font-weight: 600;
    letter-spacing: 1px;
    font-family: 'Montserrat', sans-serif;
    color: var(--primary-color);
  }

  /* Theme selector styling */
  #themeSelect {
    position: fixed;
    top: 20px;
    right: 80px;
    padding: 8px 12px;
    border-radius: 8px;
    border: 1px solid #ccc;
    font-size: 14px;
    cursor: pointer;
    transition: box-shadow 0.2s, transform 0.2s;
    z-index: 10;
  }

  #themeSelect:hover {
    box-shadow: 0 4px 8px rgba(0,0,0,0.2);
    transform: scale(1.02);
  }

  /* Volume button styles */
  #volume-btn {
    position: fixed;
    top: 20px;
    right: 20px;
    background: var(--primary-color);
    border: none;
    border-radius: 50%;
    width: 50px;
    height: 50px;
    cursor: pointer;
    box-shadow: 0 4px 8px rgba(0,0,0,0.2);
    font-size: 18px;
    color: white;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.2s, transform 0.2s, box-shadow 0.2s;
  }

  #volume-btn:hover {
    background: var(--hover-bg-color);
    box-shadow: 0 6px 16px rgba(0,0,0,0.3);
    transform: scale(1.05);
  }

  /* Main headings */
  h1 {
    text-align: center;
    font-weight: 600;
    letter-spacing: 1px;
    margin-bottom: 20px;
    font-size: 2em;
  }

  h2 {
    margin-top: 30px;
    font-weight: 500;
    border-left: 5px solid var(--primary-color);
    padding-left: 10px;
    color: var(--primary-color);
    font-size: 1.5em;
  }

  /* Panels style */
  .panel {
    background: var(--panel-bg);
    padding: 20px;
    margin-top: 15px;
    border-radius: 12px;
    box-shadow: 0 3px 10px var(--panel-shadow);
    transition: box-shadow 0.3s, transform 0.3s;
  }
  .panel:hover {
    box-shadow: 0 8px 20px var(--hover-shadow);
    transform: translateY(-2px);
  }

  /* Button grid styles */
  #buttons {
    display: grid;
    grid-template-columns: repeat(10, 1fr);
    gap: 12px;
    margin-top: 20px;
  }
  #buttons button {
    padding: 16px;
    font-size: 14px;
    border-radius: 10px;
    border: none;
    background: var(--button-bg);
    box-shadow: 0 2px 6px var(--button-shadow);
    transition: transform 0.1s, box-shadow 0.2s, background-color 0.2s;
    cursor: pointer;
    white-space: nowrap;
    font-weight: 500;
    position: relative;
    overflow: hidden;
  }
  #buttons button:hover {
    transform: translateY(-3px);
    box-shadow: 0 4px 12px var(--hover-shadow);
    background-color: var(--hover-bg-color);
  }

  /* Recording controls styles */
  #recording-controls button {
    padding: 10px 16px;
    border-radius: 8px;
    border: none;
    margin-right: 10px;
    font-size: 14px;
    cursor: pointer;
    background: var(--primary-color);
    color: white;
    transition: background 0.2s, transform 0.2s;
  }
  #recording-controls button:disabled {
    background: #9bbfe9;
    cursor: default;
    opacity: 0.6;
  }
  #recording-controls button:hover:not(:disabled) {
    background: #3574c9;
    transform: scale(1.05);
  }

  /* Customizer styles */
  #customizer {
    display: flex;
    flex-wrap: wrap;
    gap: 15px;
    align-items: center;
    margin-top: 15px;
  }
  #saveCustom {
    padding: 10px 16px;
    background: var(--secondary-color);
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    transition: background 0.2s, transform 0.2s;
    font-size: 14px;
  }
  #saveCustom:hover {
    background: #1f8c4c;
    transform: scale(1.05);
  }
  /* Inputs styling */
  select, input[type="text"], input[type="color"] {
    padding: 8px;
    border-radius: 8px;
    border: 1px solid #ccc;
    background: #fff;
    font-size: 14px;
    transition: box-shadow 0.2s;
  }
  select:focus, input[type="text"]:focus, input[type="color"]:focus {
    box-shadow: 0 0 8px rgba(74, 144, 226, 0.5);
    outline: none;
  }
</style>
</head>
<body>

<!-- Logo/Header with your image -->
<div id="logo-container">
  <img id="logo" src="https://i.pinimg.com/1200x/0b/8b/18/0b8b18e654a6261fffcd7d6e1561e6c4.jpg" alt="Logo" />
  <div id="logo-text">Audio Button Board</div>
</div>

<!-- Theme selector -->
<select id="themeSelect" title="Choose Theme">
  <option value="light">Light</option>
  <option value="dark">Dark</option>
  <option value="colorful">Colorful</option>
  <option value="vibrant">Vibrant</option>
  <option value="pastel">Pastel</option>
  <option value="metallic">Metallic</option>
</select>

<!-- Volume toggle button -->
<button id="volume-btn" title="Toggle Mute">🔊</button>

<!-- ========================= -->
<!--     Recording Tab         -->
<!-- ========================= -->
<h2>Recording</h2>
<div id="recording-controls" class="panel">
    <button id="startRecord">Start Recording</button>
    <button id="stopRecord" disabled>Stop Recording</button>
    <p id="recordStatus">Not recording.</p>

    <label>
        Program to button:
        <select id="assignSelect"></select>
    </label>
    <button id="assignBtn" disabled>Assign Recording</button>
</div>

<!-- ========================= -->
<!--     Button Customizer     -->
<!-- ========================= -->
<h2>Customize Buttons</h2>
<div id="customizer" class="panel">
    <label>
        Select Button:
        <select id="customSelect"></select>
    </label>

    <label>
        Name:
        <input type="text" id="customName" />
    </label>

    <label>
        Color:
        <input type="color" id="customColor" />
    </label>

    <button id="saveCustom">Save Changes</button>
</div>

<h2>Soundboard</h2>
<div id="buttons" class="panel"></div>

<script>
/* -------------------------
   Theme management
--------------------------*/
const themeSelect = document.getElementById('themeSelect');

const themes = {
    light: {
        '--bg-color': '#f5f6fa',
        '--text-color': '#333',
        '--primary-color': '#4a90e2',
        '--secondary-color': '#27ae60',
        '--hover-bg-color': '#f0f0f0',
        '--button-bg': '#fff',
        '--button-shadow': 'rgba(0,0,0,0.1)',
        '--panel-bg': '#fff',
        '--panel-shadow': 'rgba(0,0,0,0.08)',
        '--hover-shadow': 'rgba(0,0,0,0.18)',
    },
    dark: {
        '--bg-color': '#222',
        '--text-color': '#eee',
        '--primary-color': '#66ccff',
        '--secondary-color': '#55cc66',
        '--hover-bg-color': '#444',
        '--button-bg': '#333',
        '--button-shadow': 'rgba(0,0,0,0.3)',
        '--panel-bg': '#333',
        '--panel-shadow': 'rgba(0,0,0,0.4)',
        '--hover-shadow': 'rgba(0,0,0,0.6)',
    },
    colorful: {
        '--bg-color': '#fff8e1',
        '--text-color': '#444',
        '--primary-color': '#e91e63',
        '--secondary-color': '#ff9800',
        '--hover-bg-color': '#ffe0b2',
        '--button-bg': '#fff3e0',
        '--button-shadow': 'rgba(0,0,0,0.1)',
        '--panel-bg': '#fffde7',
        '--panel-shadow': 'rgba(0,0,0,0.08)',
        '--hover-shadow': 'rgba(0,0,0,0.18)',
    },
    vibrant: {
        '--bg-color': '#ffe600',
        '--text-color': '#222',
        '--primary-color': '#ff3b00',
        '--secondary-color': '#00b4d8',
        '--hover-bg-color': '#ffe600',
        '--button-bg': 'linear-gradient(135deg, #ff3b00, #00b4d8)',
        '--button-shadow': 'rgba(0,0,0,0.2)',
        '--panel-bg': '#fff8dc',
        '--panel-shadow': 'rgba(0,0,0,0.1)',
        '--hover-shadow': 'rgba(0,0,0,0.2)',
    },
    pastel: {
        '--bg-color': '#f8e2f9',
        '--text-color': '#555',
        '--primary-color': '#a7c7e7',
        '--secondary-color': '#f7c59f',
        '--hover-bg-color': '#f7c59f',
        '--button-bg': '#fde2e2',
        '--button-shadow': 'rgba(0,0,0,0.1)',
        '--panel-bg': '#fff0f5',
        '--panel-shadow': 'rgba(0,0,0,0.08)',
        '--hover-shadow': 'rgba(0,0,0,0.15)',
    },
    metallic: {
        '--bg-color': '#1c1c1c',
        '--text-color': '#e0e0e0',
        '--primary-color': '#b0c4de',
        '--secondary-color': '#ffd700',
        '--hover-bg-color': '#333',
        '--button-bg': 'linear-gradient(135deg, #b0c4de, #ffd700)',
        '--button-shadow': 'rgba(0,0,0,0.4)',
        '--panel-bg': '#2b2b2b',
        '--panel-shadow': 'rgba(0,0,0,0.5)',
        '--hover-shadow': 'rgba(0,0,0,0.7)',
    }
};

function applyTheme(themeName) {
    // Remove existing theme classes
    document.body.className = '';
    document.body.classList.remove('theme-vibrant', 'theme-pastel', 'theme-metallic');
    // Add new theme class
    document.body.classList.add(`theme-${themeName}`);
    const theme = themes[themeName];
    for (let varName in theme) {
        // Only set CSS variables for UI, not button colors
        if (!varName.includes('button')) {
            document.documentElement.style.setProperty(varName, theme[varName]);
        }
    }
}

// Load saved theme or default
const savedTheme = localStorage.getItem('theme') || 'light';
applyTheme(savedTheme);
document.getElementById('themeSelect').value = savedTheme;

// Populate theme options dynamically
for (const themeName in themes) {
    const option = document.createElement('option');
    option.value = themeName;
    option.textContent = themeName.charAt(0).toUpperCase() + themeName.slice(1);
    if (themeName === savedTheme) option.selected = true;
    document.getElementById('themeSelect').appendChild(option);
}

document.getElementById('themeSelect').onchange = () => {
    const selectedTheme = document.getElementById('themeSelect').value;
    localStorage.setItem('theme', selectedTheme);
    applyTheme(selectedTheme);
};

/* -------------------------
   SETUP: Create 100 Buttons
--------------------------*/
const buttonContainer = document.getElementById("buttons");
const assignSelect = document.getElementById("assignSelect");
const customSelect = document.getElementById("customSelect");
const volumeBtn = document.getElementById("volume-btn");

let audioClips = new Array(100).fill(null);
let buttons = [];
let buttonData = JSON.parse(localStorage.getItem("buttonData") || "{}");
let isMuted = false;

/* Create buttons dynamically */
for (let i = 1; i <= 100; i++) {
    const index = i - 1;
    const btn = document.createElement("button");
    btn.textContent = buttonData[index]?.name || ("Button " + i);
    // Set button color from saved data
    if (buttonData[index]?.color) {
        btn.style.backgroundColor = buttonData[index].color;
    }
    btn.dataset.index = index;

    btn.addEventListener("click", () => {
        if (audioClips[index]) {
            if (!isMuted) {
                audioClips[index].play();
            }
        } else {
            alert("No audio saved for Button " + (index + 1));
        }
    });

    buttonContainer.appendChild(btn);
    buttons[index] = btn;

    // Populate dropdowns
    const opt = document.createElement("option");
    opt.value = index;
    opt.textContent = "Button " + i;
    assignSelect.appendChild(opt);

    const opt2 = document.createElement("option");
    opt2.value = index;
    opt2.textContent = "Button " + i;
    customSelect.appendChild(opt2);
}

/* Load saved audio from localStorage */
async function loadSavedAudio() {
    for (let i = 0; i < 100; i++) {
        const base64 = localStorage.getItem("audio_" + i);
        if (base64) {
            const blob = base64ToBlob(base64, "audio/webm");
            audioClips[i] = new Audio(URL.createObjectURL(blob));
        }
    }
}
loadSavedAudio();

/* Recording functionality */
let mediaRecorder;
let chunks = [];
let recordedAudioBlob = null;

const startBtn = document.getElementById("startRecord");
const stopBtn = document.getElementById("stopRecord");
const assignBtn = document.getElementById("assignBtn");
const statusText = document.getElementById("recordStatus");

startBtn.onclick = async () => {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    mediaRecorder = new MediaRecorder(stream);
    chunks = [];
    recordedAudioBlob = null;

    mediaRecorder.ondataavailable = (e) => chunks.push(e.data);
    mediaRecorder.onstop = () => {
        recordedAudioBlob = new Blob(chunks, { type: "audio/webm" });
        assignBtn.disabled = false;
        statusText.textContent = "Recording finished. Ready to assign.";
    };

    mediaRecorder.start();
    startBtn.disabled = true;
    stopBtn.disabled = false;
    statusText.textContent = "Recording...";
};

stopBtn.onclick = () => {
    mediaRecorder.stop();
    startBtn.disabled = false;
    stopBtn.disabled = true;
};

/* Assign recorded audio to button */
assignBtn.onclick = async () => {
    if (!recordedAudioBlob) return;
    const index = assignSelect.value;
    audioClips[index] = new Audio(URL.createObjectURL(recordedAudioBlob));
    const base64 = await blobToBase64(recordedAudioBlob);
    localStorage.setItem("audio_" + index, base64);
    alert("Saved to Button " + (parseInt(index) + 1));
};

/* Button customizer */
const customName = document.getElementById("customName");
const customColor = document.getElementById("customColor");
const saveCustom = document.getElementById("saveCustom");

customSelect.onchange = () => {
    const index = customSelect.value;
    customName.value = buttonData[index]?.name || ("Button " + (parseInt(index) + 1));
    customColor.value = buttonData[index]?.color || "#ffffff";
};
customSelect.dispatchEvent(new Event("change"));

saveCustom.onclick = () => {
    const index = customSelect.value;
    const name = customName.value.trim();
    const color = customColor.value;
    buttonData[index] = { name, color };
    buttons[index].textContent = name;
    buttons[index].style.backgroundColor = color; // update button color
    localStorage.setItem("buttonData", JSON.stringify(buttonData));
};

/* Helper functions for Blob <-> Base64 conversions */
function blobToBase64(blob) {
    return new Promise((resolve) => {
        const reader = new FileReader();
        reader.onloadend = () => resolve(reader.result.split(",")[1]);
        reader.readAsDataURL(blob);
    });
}
function base64ToBlob(base64, mime) {
    const bytes = atob(base64);
    const arr = new Uint8Array(bytes.length);
    for (let i = 0; i < bytes.length; i++) {
        arr[i] = bytes.charCodeAt(i);
    }
    return new Blob([arr], { type: mime });
}

/* -------------------------
   Volume toggle button
--------------------------*/
volumeBtn.onclick = () => {
    isMuted = !isMuted;
    volumeBtn.textContent = isMuted ? "🔇" : "🔊";
};
</script>
</body>
</html>
