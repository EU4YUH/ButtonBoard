<div id="recording-controls" class="panel">

    <button id="stopRecord" disabled>Stop Recording</button>
    <p id="recordStatus">Not recording.</p>
    <label>
        Program to button:
        <select id="assignSelect"></select>
    </label>
    <button id="assignBtn" disabled>Assign Recording</button>
</div>

<h2>Customize Buttons</h2>
<div id="customizer" class="panel">...</div>

<h2>Soundboard</h2>
<div id="buttons" class="panel"></div>

<script>
/* -------------------------
   Theme management (same as previous, omitted here for brevity, include full code in actual implementation) */
const themeSelect = document.getElementById('themeSelect');
const themes = { /* ... themes object ... */ };
function applyTheme(themeName) { /* ... */ }
const savedTheme = localStorage.getItem('theme') || 'light';
applyTheme(savedTheme);
document.getElementById('themeSelect').value = savedTheme;
for (const themeName in themes) {
  /* ... populate options ... */
}
document.getElementById('themeSelect').onchange = () => {
  /* ... apply theme ... */
};

/* -------------------------
   Create 100 Buttons and setup variables */
const buttonContainer = document.getElementById("buttons");
const assignSelect = document.getElementById("assignSelect");
const customSelect = document.getElementById("customSelect");
const volumeBtn = document.getElementById("volume-btn");
const errorDiv = document.getElementById('errorMessage');

let audioClips = new Array(100).fill(null);
let buttons = [];
let buttonData = JSON.parse(localStorage.getItem("buttonData") || "{}");
let isMuted = false;

/* Show error message */
function showError(message) {
    errorDiv.textContent = message;
    errorDiv.style.display = 'block';
    setTimeout(() => {
        errorDiv.style.display = 'none';
    }, 5000);
}

/* Generate buttons */
for (let i = 1; i <= 100; i++) {
   /* ... button creation code ... */
}

/* Load saved audio */
async function loadSavedAudio() {
    for (let i = 0; i < 100; i++) {
        const base64 = localStorage.getItem("audio_" + i);
        if (base64) {
            try {
                const blob = base64ToBlob(base64, "audio/webm");
                audioClips[i] = new Audio(URL.createObjectURL(blob));
            } catch (err) {
                showError("Error loading audio for Button " + (i + 1));
                console.error(err);
            }
        }
    }
}
loadSavedAudio();

/* Recording with silence cropping */
let mediaRecorder;
let chunks = [];
let recordedAudioBlob = null;

const startBtn = document.getElementById("startRecord");
const stopBtn = document.getElementById("stopRecord");
const assignBtn = document.getElementById("assignBtn");
const statusText = document.getElementById("recordStatus");

startBtn.onclick = async () => {
    try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        mediaRecorder = new MediaRecorder(stream);
        chunks = [];
        recordedAudioBlob = null;

        mediaRecorder.ondataavailable = (e) => chunks.push(e.data);
        mediaRecorder.onstop = async () => {
            const rawBlob = new Blob(chunks, { type: "audio/webm" });
            // Trim silence
            try {
                const trimmedBlob = await trimSilence(rawBlob);
                recordedAudioBlob = trimmedBlob;
                // Enable assign button
                assignBtn.disabled = false;
                document.getElementById("recordStatus").textContent = "Recording finished. Ready to assign.";
            } catch (err) {
                showError("Error trimming silence");
                console.error(err);
            }
        };

        mediaRecorder.start();
        startBtn.disabled = true;
        stopBtn.disabled = false;
        statusText.textContent = "Recording...";
    } catch (err) {
        showError("Error accessing microphone");
        console.error(err);
    }
};

stopBtn.onclick = () => {
    if (mediaRecorder && mediaRecorder.state !== 'inactive') {
        try {
            mediaRecorder.stop();
            startBtn.disabled = false;
            stopBtn.disabled = true;
        } catch (err) {
            showError("Error stopping recording");
            console.error(err);
        }
    }
};

/* Assign recorded audio to button */
const blobToBase64 = (blob) => {
    return new Promise((resolve) => {
        const reader = new FileReader();
        reader.onloadend = () => resolve(reader.result.split(",")[1]);
        reader.readAsDataURL(blob);
    });
};

async function trimSilence(blob, silenceThreshold = 0.02, minSilenceDuration = 0.2) {
    const arrayBuffer = await blob.arrayBuffer();
    const audioCtx = new AudioContext();
    const audioBuffer = await audioCtx.decodeAudioData(arrayBuffer);
    const { numberOfChannels, length, sampleRate } = audioBuffer;
    const channelData = [];
    for (let ch = 0; ch < numberOfChannels; ch++) {
        channelData[ch] = audioBuffer.getChannelData(ch);
    }

    const silenceSamples = minSilenceDuration * sampleRate;
    let startSample = 0;
    let endSample = length - 1;

    // Find start index
    for (let i = 0; i < length; i++) {
        let maxSample = 0;
        for (let ch = 0; ch < numberOfChannels; ch++) {
            maxSample = Math.max(maxSample, Math.abs(channelData[ch][i]));
        }
        if (maxSample > silenceThreshold) {
            startSample = i;
            break;
        }
    }

    // Find end index
    for (let i = length - 1; i >= 0; i--) {
        let maxSample = 0;
        for (let ch = 0; ch < numberOfChannels; ch++) {
            maxSample = Math.max(maxSample, Math.abs(channelData[ch][i]));
        }
        if (maxSample > silenceThreshold) {
            endSample = i;
            break;
        }
    }

    // Crop the buffer
    const croppedLength = endSample - startSample + 1;
    const newBuffer = audioCtx.createBuffer(
        numberOfChannels,
        croppedLength,
        sampleRate
    );

    for (let ch = 0; ch < numberOfChannels; ch++) {
        newBuffer.copyToChannel(
            channelData[ch].slice(startSample, endSample + 1),
            ch,
            0
        );
    }

    // Convert to Blob
    const trimmedBlob = await bufferToBlob(newBuffer);
    return trimmedBlob;
}

function bufferToBlob(audioBuffer) {
    // Basic WAV encoder for simplicity
    return new Promise((resolve, reject) => {
        const offlineCtx = new OfflineAudioContext(
            audioBuffer.numberOfChannels,
            audioBuffer.length,
            audioBuffer.sampleRate
        );
        const bufferSource = offlineCtx.createBufferSource();
        bufferSource.buffer = audioBuffer;
        bufferSource.connect(offlineCtx.destination);
        bufferSource.start();

        offlineCtx.startRendering().then(renderedBuffer => {
            const wavData = encodeWAV(renderedBuffer);
            resolve(new Blob([wavData], { type: 'audio/wav' }));
        }).catch(reject);
    });
}

// WAV encoding (simplified)
function encodeWAV(audioBuffer) {
    const numChannels = audioBuffer.numberOfChannels;
    const sampleRate = audioBuffer.sampleRate;
    const format = 1; // PCM
    const bitDepth = 16;
    const samples = flattenBuffer(audioBuffer);
    const byteRate = sampleRate * numChannels * bitDepth / 8;
    const blockAlign = numChannels * bitDepth / 8;
    const dataSize = samples.length * 2;

    const buffer = new ArrayBuffer(44 + dataSize);
    const view = new DataView(buffer);

    /* RIFF identifier */
    writeString(view, 0, 'RIFF');
    /* file length */
    view.setUint32(4, 36 + dataSize, true);
    /* RIFF type */
    writeString(view, 8, 'WAVE');
    /* format chunk identifier */
    writeString(view, 12, 'fmt ');
    /* format chunk length */
    view.setUint32(16, 16, true);
    /* sample format (raw) */
    view.setUint16(20, format, true);
    /* number of channels */
    view.setUint16(22, numChannels, true);
    /* sample rate */
    view.setUint32(24, sampleRate, true);
    /* byte rate */
    view.setUint32(28, byteRate, true);
    /* block align */
    view.setUint16(32, blockAlign, true);
    /* bits per sample */
    view.setUint16(34, bitDepth, true);
    /* data chunk identifier */
    writeString(view, 36, 'data');
    /* data chunk length */
    view.setUint32(40, dataSize, true);

    // Write samples
    let offset = 44;
    for (let i = 0; i < samples.length; i++, offset += 2) {
        const s = Math.max(-1, Math.min(1, samples[i]));
        view.setInt16(offset, s * 32767, true);
    }

    function writeString(view, offset, string) {
        for (let i = 0; i < string.length; i++) {
            view.setUint8(offset + i, string.charCodeAt(i));
        }
    }

    // flatten buffer
    function flattenBuffer(audioBuffer) {
        const channels = [];
        for (let ch = 0; ch < audioBuffer.numberOfChannels; ch++) {
            channels.push(audioBuffer.getChannelData(ch));
        }
        const length = channels[0].length;
        const result = new Float32Array(length * channels.length);
        for (let i = 0; i < length; i++) {
            for (let ch = 0; ch < channels.length; ch++) {
                result[i * channels.length + ch] = channels[ch][i];
            }
        }
        return result;
    }

    return buffer;
}

/* Save recording to button */
const assignButton = document.getElementById("assignBtn");
assignButton.onclick = async () => {
    const index = assignSelect.value;
    if (!recordedAudioBlob) {
        showError("No recording to assign");
        return;
    }
    try {
        const base64 = await blobToBase64(recordedAudioBlob);
        localStorage.setItem("audio_" + index, base64);
        await loadSavedAudio();
        alert("Saved to Button " + (parseInt(index) + 1));
    } catch (err) {
        showError("Error saving audio");
        console.error(err);
    }
};

/* Remaining UI handlers for customizing buttons, mute toggle, etc. (same as previous, omitted here for brevity) */

volumeBtn.onclick = () => {
    isMuted = !isMuted;
    volumeBtn.textContent = isMuted ? "🔇" : "🔊";
};
</script>
